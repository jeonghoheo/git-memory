hermes_sessions: ~/hermes/sessions
git_memory_repo: ~/hermes_git_memory
log_file: ~/hermes/logs/git_memory.log
processed_marker: ~/.hermes/last_git_memory_session.txt
logging:
  level: INFO

keywords:
  wedding:
    - wedding
    - venue
    - ceremony
    - reception
    - photographer
    - 결혼
    - 예식
    - 신혼여행
  russian:
    - russian
    - 러시아어
    - verb
    - aspect
    - imperfective
    - perfective
    - нсв
    - св
    - case
    - 격
  development:
    - 기술 부채
    - 인지 부채
    - 의도 부채
    - 리팩토링
    - 모듈화

category_rules:
  - keywords: [wedding, venue, ceremony, reception, photographer, 결혼, 예식, 신혼여행]
    category: wedding
    subcategory: plans
  - keywords: [russian, 러시아어, verb, aspect, imperfective, perfective, нсв, св, case, 격]
    category: russian
    subcategory: grammar
  - keywords: [기술 부채, 인지 부채, 의도 부채, 리팩토링, 모듈화]
    category: development
    subcategory: principles
