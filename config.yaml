# Hermes Git Memory Configuration (Expanded v0.2.0-Sprint1)

# ── 경로 설정 ──────────────────────────────────────────────────────────────
hermes_sessions: ~/hermes/sessions
git_memory_repo: ~/hermes_git_memory
log_file: ~/hermes/logs/git_memory.log
processed_marker: ~/.hermes/last_git_memory_session.txt

# ── 커밋 임계값 ────────────────────────────────────────────────────────────
min_messages: 5          # 최소 메시지 수
min_duration_seconds: 120  # 최소 세션 시간 (2분)

